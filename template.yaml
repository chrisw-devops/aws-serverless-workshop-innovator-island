AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Serverless Island Ops - a compact theme park operations demo on S3, DynamoDB, API Gateway, and Lambda.

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        TABLE_NAME: !Ref IslandTable
        MEDIA_BUCKET: !Ref MediaBucket
        ALLOWED_ORIGIN: '*'

Resources:
  IslandApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - PATCH
          - OPTIONS
        AllowHeaders:
          - content-type

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: src/
      Handler: api.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IslandTable
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref IslandApi
            Path: /api
            Method: ANY
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref IslandApi
            Path: /api/{proxy+}
            Method: ANY

  WaitTimeSimulatorFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: src/
      Handler: simulator.handler
      Timeout: 20
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IslandTable
      Events:
        EveryTwoMinutes:
          Type: Schedule
          Properties:
            Schedule: rate(2 minutes)
            Description: Varies attraction wait times and operating states.

  IslandTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadWebsiteObjects
            Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub '${WebsiteBucket.Arn}/*'

  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - '*'
            AllowedMethods:
              - PUT
              - GET
              - HEAD
            AllowedHeaders:
              - '*'
            MaxAge: 3000
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

Outputs:
  ApiUrl:
    Description: API Gateway endpoint used by the frontend.
    Value: !Sub 'https://${IslandApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/api'
  WebsiteBucketName:
    Description: S3 bucket for static website files.
    Value: !Ref WebsiteBucket
  WebsiteUrl:
    Description: Public S3 website endpoint.
    Value: !Sub 'http://${WebsiteBucket}.s3-website-${AWS::Region}.${AWS::URLSuffix}'
  MediaBucketName:
    Description: S3 bucket for guest photo uploads.
    Value: !Ref MediaBucket
